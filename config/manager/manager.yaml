apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/name: unified-platform-operator
    app.kubernetes.io/managed-by: kustomize
    control-plane: controller-manager
  name: upo-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upo-controller-manager
  namespace: upo-system
  labels:
    app.kubernetes.io/name: unified-platform-operator
    control-plane: controller-manager
spec:
  # Run a single active reconciler. Scale replicas >1 for hot-standby HA; leader
  # election (enabled below) guarantees exactly one active manager at a time.
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: upo-controller-manager
      terminationGracePeriodSeconds: 10
      containers:
      - name: manager
        image: controller:latest
        command:
        - /manager
        args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8443
        - --metrics-secure
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        - containerPort: 8443
          name: https
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: webhook-certs
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
      volumes:
      - name: webhook-certs
        secret:
          secretName: upo-webhook-server-cert
