---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: upo-mutating-webhook-configuration
  annotations:
    # cert-manager's ca-injector populates .clientConfig.caBundle from this cert.
    cert-manager.io/inject-ca-from: upo-system/upo-serving-cert
webhooks:
- name: mtenant-v1alpha1.kb.io
  admissionReviewVersions:
  - v1
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: upo-webhook-service
      namespace: upo-system
      path: /mutate-platform-upo-io-v1alpha1-tenant
  rules:
  - apiGroups:
    - platform.upo.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - tenants
- name: menvironment-v1alpha1.kb.io
  admissionReviewVersions:
  - v1
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: upo-webhook-service
      namespace: upo-system
      path: /mutate-platform-upo-io-v1alpha1-environment
  rules:
  - apiGroups:
    - platform.upo.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - environments
- name: mintegration-v1alpha1.kb.io
  admissionReviewVersions:
  - v1
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: upo-webhook-service
      namespace: upo-system
      path: /mutate-platform-upo-io-v1alpha1-integration
  rules:
  - apiGroups:
    - platform.upo.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - integrations
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: upo-validating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: upo-system/upo-serving-cert
webhooks:
- name: vtenant-v1alpha1.kb.io
  admissionReviewVersions:
  - v1
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: upo-webhook-service
      namespace: upo-system
      path: /validate-platform-upo-io-v1alpha1-tenant
  rules:
  - apiGroups:
    - platform.upo.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - tenants
- name: venvironment-v1alpha1.kb.io
  admissionReviewVersions:
  - v1
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: upo-webhook-service
      namespace: upo-system
      path: /validate-platform-upo-io-v1alpha1-environment
  rules:
  - apiGroups:
    - platform.upo.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - environments
- name: vintegration-v1alpha1.kb.io
  admissionReviewVersions:
  - v1
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: upo-webhook-service
      namespace: upo-system
      path: /validate-platform-upo-io-v1alpha1-integration
  rules:
  - apiGroups:
    - platform.upo.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - integrations
