{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "upo.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "upo.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "upo.selectorLabels" . | nindent 4 }}
  ports:
  - name: https
    port: {{ .Values.metrics.port }}
    targetPort: {{ .Values.metrics.port }}
    protocol: TCP
{{- end }}
{{- if .Values.webhooks.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "upo.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "upo.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "upo.selectorLabels" . | nindent 4 }}
  ports:
  - port: 443
    targetPort: 9443
    protocol: TCP
{{- end }}
