name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Materialize go.sum so the linter can load/type-check the packages.
      - run: go mod download
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # 'latest' guarantees the binary is built with a Go toolchain >= the
          # version targeted by go.mod, avoiding the version-skew failure.
          version: latest
