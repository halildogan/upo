# golangci-lint v2 configuration.
# v2 is required so the linter binary is built with a Go toolchain >= the
# version targeted by go.mod. The v1 line is EOL and its binaries were built
# with go1.23, which trips golangci-lint's "targeted Go version is higher"
# guard on newer toolchains (the failure seen in CI).
version: "2"

linters:
  # Curated, explicit set for predictable and stable results.
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/halildogan/upo
