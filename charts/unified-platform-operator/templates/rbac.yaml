apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "upo.fullname" . }}-manager-role
  labels:
    {{- include "upo.labels" . | nindent 4 }}
rules:
- apiGroups: ["platform.upo.io"]
  resources: ["tenants", "environments", "integrations"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["platform.upo.io"]
  resources: ["tenants/finalizers", "environments/finalizers", "integrations/finalizers"]
  verbs: ["update"]
- apiGroups: ["platform.upo.io"]
  resources: ["tenants/status", "environments/status", "integrations/status"]
  verbs: ["get", "patch", "update"]
- apiGroups: [""]
  resources: ["namespaces", "resourcequotas", "limitranges", "configmaps", "secrets"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["rolebindings"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["source.toolkit.fluxcd.io"]
  resources: ["gitrepositories"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["kustomize.toolkit.fluxcd.io"]
  resources: ["kustomizations"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "upo.fullname" . }}-manager-rolebinding
  labels:
    {{- include "upo.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "upo.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "upo.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- if .Values.leaderElection.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "upo.fullname" . }}-leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "upo.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "upo.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "upo.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "upo.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "upo.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- if and .Values.metrics.enabled .Values.metrics.secure }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "upo.fullname" . }}-metrics-auth-role
  labels:
    {{- include "upo.labels" . | nindent 4 }}
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "upo.fullname" . }}-metrics-auth-rolebinding
  labels:
    {{- include "upo.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "upo.fullname" . }}-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: {{ include "upo.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
