name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  image:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          make docker-buildx IMG=ghcr.io/halildogan/upo:${GITHUB_REF_NAME}

  artifacts:
    name: Publish install bundle & chart
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: azure/setup-helm@v4
      - name: Render install bundle
        run: |
          make kustomize
          cd config/manager && ../../bin/kustomize edit set image controller=ghcr.io/halildogan/upo:${GITHUB_REF_NAME} && cd -
          ./bin/kustomize build config/default > install.yaml
      - name: Package Helm chart
        run: helm package charts/unified-platform-operator --version "${GITHUB_REF_NAME#v}" --app-version "${GITHUB_REF_NAME#v}"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.yaml
            unified-platform-operator-*.tgz
