{{- if and .Values.webhooks.enabled .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "upo.fullname" . }}-selfsigned-issuer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "upo.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "upo.certificateName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "upo.labels" . | nindent 4 }}
spec:
  dnsNames:
  - {{ include "upo.webhookServiceName" . }}.{{ .Release.Namespace }}.svc
  - {{ include "upo.webhookServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include "upo.fullname" . }}-selfsigned-issuer
  secretName: {{ include "upo.certificateSecretName" . }}
{{- end }}
